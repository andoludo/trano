BoilerControlParameters:
  attributes:
    threshold_outdoor_air_cutoff:
      alias: threshold_outdoor_air_cutoff
      description: Outdoor air temperature threshold; output is true when the outdoor air is below this heating cut-off limit [K]
      ifabsent: float(288.15)
      range: float
    threshold_to_switch_off_boiler:
      alias: threshold_to_switch_off_boiler
      description: Temperature threshold used to switch the boiler off [K]
      ifabsent: float(288.15)
      range: float
    tsup_nominal:
      alias: TSup_nominal
      description: Nominal supply temperature for the radiators [K]
      ifabsent: float(353.15)
      range: float
  classes:
  - BoilerControl
BoilerParameters:
  attributes:
    coefficients_for_efficiency_curve:
      alias: a
      description: Coefficients for efficiency curve
      ifabsent: string({0.9})
      range: string
    diff_pressure:
      alias: dp
      description: Pressure rise values defining the boiler-circuit pump pressure curve [Pa]
      ifabsent: string(5000*{2,1})
      range: string
    dp_nominal:
      alias: dp_nominal
      description: Pressure difference [Pa]
      ifabsent: float(5000)
      range: float
    dt_boi_nominal:
      alias: dTBoi_nominal
      description: Nominal temperature difference for the boiler loop [K]
      ifabsent: float(20)
      range: float
    dt_rad_nominal:
      alias: dTRad_nominal
      description: Nominal temperature difference for the radiator loop [K]
      ifabsent: float(10)
      range: float
    effcur:
      alias: effCur
      description: Curve used to compute the efficiency
      ifabsent: string(Buildings.Fluid.Types.EfficiencyCurves.Constant)
      range: string
    fraction_of_nominal_flow_rate_where_flow_transitions_to_laminar:
      alias: deltaM
      description: Fraction of nominal flow rate where flow transitions to laminar [1]
      ifabsent: float(0.1)
      range: float
    height_of_tank_without_insulation:
      alias: hTan
      description: Height of tank (without insulation) [m]
      ifabsent: float(2)
      range: float
    if_actual_temperature_at_port_is_computed:
      alias: show_T
      description: = true, if actual temperature at port is computed
      ifabsent: string(false)
      range: string
    nominal_heating_power:
      alias: Q_flow_nominal
      description: Nominal heating power [W]
      ifabsent: float(20000)
      range: float
    nominal_mass_flow_radiator_loop:
      alias: null
      description: Nominal mass flow rate of the radiator loop [kg/s]
      func: 'lambda self: self.sca_fac_rad * self.nominal_heating_power / self.dt_rad_nominal
        / 4200'
      type: float
    nominal_mass_flow_rate_boiler:
      alias: null
      description: Nominal mass flow rate of the boiler loop [kg/s]
      func: 'lambda self: self.sca_fac_rad * self.nominal_heating_power / self.dt_rad_nominal
        / 4200'
      type: float
    number_of_volume_segments:
      alias: nSeg
      description: Number of volume segments [1]
      ifabsent: int(4)
      range: integer
    sca_fac_rad:
      alias: scaFacRad
      description: Scaling factor to scale the power (and mass flow rate) of the radiator loop [1]
      ifabsent: float(1.5)
      range: float
    tank_volume:
      alias: VTan
      description: Tank volume [m3]
      ifabsent: float(0.2)
      range: float
    temperature_used_to_compute_nominal_efficiency:
      alias: T_nominal
      description: Temperature used to compute nominal efficiency (only used if efficiency curve depends on temperature) [K]
      ifabsent: float(353.15)
      range: float
    thickness_of_insulation:
      alias: dIns
      description: Thickness of insulation [m]
      ifabsent: float(0.002)
      range: float
    use_linear_relation_between_m_flow_and_dp_for_any_flow_rate:
      alias: linearizeFlowResistance
      description: = true, use linear relation between m_flow and dp for any flow rate
      ifabsent: string(true)
      range: string
    v_flow:
      alias: V_flow
      description: Volume flow rate values defining the boiler-circuit pump pressure curve [m3/s]
      func: 'lambda self: f''{self.nominal_mass_flow_rate_boiler}'' ''/1000*{0.5,1}'''
      type: str
    use_storage_tank:
      alias: useStorageTank
      description: None
      ifabsent: string(false)
      range: string
    temperature_heatpump_source:
      alias: TSouSet
      description: None
      ifabsent: float(286.15)
      range: float
    temperature_supply_setpoint_heat_pump:
      alias: TSet
      description: None
      ifabsent: float(323.15)
      range: float
  classes:
  - Boiler
ControlLoopsParameters:
  attributes:
    dt_hys:
      alias: dTHys
      description: Delta between the temperature hysteresis high and low limit [K]
      ifabsent: float(0.25)
      range: float
    k_coo_con:
      alias: kCooCon
      description: Gain of controller for cooling control loop [1]
      ifabsent: float(0.1)
      range: float
    k_hea_con:
      alias: kHeaCon
      description: Gain of controller for heating control loop [1]
      ifabsent: float(0.1)
      range: float
    loo_hys:
      alias: looHys
      description: Threshold value to check if the controller output is near zero [1]
      ifabsent: float(0.01)
      range: float
    ti_coo_con:
      alias: TiCooCon
      description: Time constant of integrator block for cooling control loop [s]
      ifabsent: float(900)
      range: float
    ti_hea_con:
      alias: TiHeaCon
      description: Time constant of integrator block for heating control loop [s]
      ifabsent: float(900)
      range: float
    tim_che:
      alias: timChe
      description: Threshold time to check the zone temperature status [s]
      ifabsent: float(30)
      range: float
  classes:

EmissionControlParameters:
  attributes:
    schedule:
      alias: schedule
      description: Schedule of switching times that toggles the heating set point between the occupied set point and the setback value
      ifabsent: string(3600*{7, 19})
      range: string
    temperature_heating_setpoint:
      alias: THeaSet
      description: Room air temperature heating set point during occupied period [K]
      ifabsent: float(297)
      range: float
    temperature_heating_setback:
      alias: THeaSetBack
      description: Room air temperature heating set point during the setback period (e.g. at night) [K]
      ifabsent: float(289)
      range: float
    controller_gain:
      alias: k
      description: Gain of controller [1]
      ifabsent: float(5)
      range: float
    data:
      alias: data
      description: Occupancy data sources
      range: DataSource
      multivalued: true
      inlined: true
      inlined_as_list: true
  classes:
  - EmissionControl
OccupancyParameters:
  attributes:
    gain:
      alias: gain
      description: Gain to convert from occupancy (per person) to radiant, convective and latent heat in [W/m2]
      ifabsent: string([35; 70; 30])
      range: string
    heat_gain_if_occupied:
      alias: k
      description: Heat gain if occupied
      ifabsent: string(1/6/4)
      range: string
    occupancy:
      alias: occupancy
      description: Occupancy table, each entry switching occupancy on or off
      ifabsent: string(3600*{7, 19})
      range: string
    ach:
      alias: ACH
      description: Infiltration [1/h]
      ifabsent: float(0.9)
      range: float
    floor_area:
      alias: AFlo
      description: Floor area [m2]
      range: float
    data:
      alias: data
      description: Occupancy data sources
      range: DataSource
      multivalued: true
      inlined: true
      inlined_as_list: true
  classes:
  - Occupancy
PIDParameters:
  attributes:
    controller_type:
      alias: controllerType
      description: Type of controller
      ifabsent: string(Buildings.Controls.OBC.CDL.Types.SimpleController.P)
      range: string
    k:
      alias: k
      description: Gain of controller [1]
      ifabsent: float(1)
      range: float
    nd:
      alias: Nd
      description: The higher Nd, the more ideal the derivative block [1]
      ifabsent: float(10)
      range: float
    ni:
      alias: Ni
      description: Ni*Ti is time constant of anti-windup compensation [1]
      ifabsent: float(0.9)
      range: float
    r:
      alias: r
      description: Typical range of control error, used for scaling the control error
      ifabsent: float(1)
      range: float
    td:
      alias: Td
      description: Time constant of derivative block [s]
      ifabsent: float(0.1)
      range: float
    ti:
      alias: Ti
      description: Time constant of integrator block [s]
      ifabsent: float(0.5)
      range: float
    y_max:
      alias: yMax
      description: Upper limit of output [1]
      ifabsent: float(1)
      range: float
    y_min:
      alias: yMin
      description: Lower limit of output [1]
      ifabsent: float(0)
      range: float
  classes:
  - ThreeWayValveControl
  - CollectorControl
PumpParameters:
  attributes:
    constant_input_set_point:
      alias: constInput
      description: Constant input set point
      range: float
    dp_nominal:
      alias: dp_nominal
      description: Nominal pressure raise [Pa]
      ifabsent: float(30000)
      range: float
    m_flow_nominal:
      alias: m_flow_nominal
      description: Nominal mass flow rate [kg/s]
      ifabsent: float(0.15)
      range: float

  classes:
  - Pump
RadiatorParameter:
  attributes:
    air_temperature_at_nominal_condition:
      alias: TAir_nominal
      description: Air temperature at nominal condition [K]
      ifabsent: float(293.15)
      range: float
    dp_nominal:
      alias: dp_nominal
      description: Pressure drop at nominal mass flow rate [Pa]
      ifabsent: float(2000)
      range: float
    dry_mass_of_radiator_that_will_be_lumped_to_water_heat_capacity:
      alias: mDry
      description: Dry mass of radiator that will be lumped to water heat capacity [kg]
      func: 'lambda self: 0.0263 * abs(self.nominal_heating_power_positive_for_heating)'
      type: float
    exponent_for_heat_transfer:
      alias: n
      description: Exponent for heat transfer
      ifabsent: float(1.24)
      range: float
    fraction_of_nominal_mass_flow_rate_where_transition_to_turbulent_occurs:
      alias: deltaM
      description: Fraction of nominal mass flow rate where transition to turbulent occurs [1]
      ifabsent: float(0.01)
      range: float
    fraction_radiant_heat_transfer:
      alias: fraRad
      description: Fraction radiant heat transfer [1]
      ifabsent: float(0.3)
      range: float
    nominal_heating_power_positive_for_heating:
      alias: Q_flow_nominal
      description: Nominal heating power (positive for heating) [W]
      ifabsent: float(5000)
      range: float
    number_of_elements_used_in_the_discretization:
      alias: nEle
      description: Number of elements used in the discretization [1]
      ifabsent: int(1)
      range: integer
    radiative_temperature_at_nominal_condition:
      alias: TRad_nominal
      description: Radiative temperature at nominal condition [K]
      ifabsent: float(293.15)
      range: float
    use_linear_relation_between_m_flow_and_dp_for_any_flow_rate:
      alias: linearized
      description: = true, use linear relation between m_flow and dp for any flow rate
      ifabsent: string(true)
      range: string
    use_m_flow_f_dp_else_dp_f_m_flow:
      alias: from_dp
      description: = true, use m_flow = f(dp) else dp = f(m_flow)
      ifabsent: string(false)
      range: string
    water_inlet_temperature_at_nominal_condition:
      alias: T_a_nominal
      description: Water inlet temperature at nominal condition [K]
      ifabsent: float(353.15)
      range: float
    water_outlet_temperature_at_nominal_condition:
      alias: T_b_nominal
      description: Water outlet temperature at nominal condition [K]
      ifabsent: float(333.15)
      range: float
    water_volume_of_radiator:
      alias: VWat
      description: Water volume of radiator [m3]
      func: lambda self:5.8e-5 * abs(self.nominal_heating_power_positive_for_heating)
      type: float
  classes:
  - Radiator
SpaceParameter:
  attributes:
    average_room_height:
      alias: hRoo
      description: Average room height [m]
      ifabsent: float(2)
      range: float
    floor_area:
      alias: AFlo
      description: Floor area [m2]
      ifabsent: float(20)
      range: float
    linearize_emissive_power:
      alias: linearizeRadiation
      description: Set to true to linearize emissive power
      ifabsent: string(true)
      range: string
    nominal_mass_flow_rate:
      alias: m_flow_nominal
      description: Nominal mass flow rate [kg/s]
      ifabsent: float(0.01)
      range: float
    sensible_thermal_mass_scaling_factor:
      alias: mSenFac
      description: Factor for scaling the sensible thermal mass of the zone air volume [1]
      ifabsent: float(1)
      range: float
    ach:
      alias: ACH
      description: Infiltration [1/h]
      range: float
    temperature_initial:
      alias: T_start
      description: Initial temperature [K]
      ifabsent: float(294.15)
      range: float
    volume:
      alias: null
      description: Air volume of the zone [m3]
      func: lambda self:self.floor_area * self.average_room_height
      type: float
  classes:
  - Space
SplitValveParameters:
  attributes:
    dp_nominal:
      alias: dp_nominal
      description: Pressure drop at nominal mass flow rate, set to zero or negative number at outflowing ports [Pa]
      ifabsent: string({5000,-1,-1})
      range: string
    fraction_of_nominal_mass_flow_rate_where_transition_to_turbulent_occurs:
      alias: deltaM
      description: Fraction of nominal mass flow rate where transition to turbulent occurs [1]
      ifabsent: float(0.3)
      range: float
    m_flow_nominal:
      alias: None
      description: Mass flow rate; set negative at outflowing ports [kg/s]
      ifabsent: string(0.1*{1,-1,-1})
      range: string
    nominal_mass_flow_rate_for_dynamic_momentum_and_energy_balance:
      alias: mDyn_flow_nominal
      description: Nominal mass flow rate for dynamic momentum and energy balance [kg/s]
      range: float
    time_constant_at_nominal_flow_for_dynamic_energy_and_momentum_balance:
      alias: tau
      description: Time constant at nominal flow for dynamic energy and momentum balance [s]
      range: float
    use_linear_relation_between_m_flow_and_dp_for_any_flow_rate:
      alias: linearized
      description: = true, use linear relation between m_flow and dp for any flow rate
      ifabsent: string(true)
      range: string
  classes:
  - SplitValve
ThreeWayValveParameters:
  attributes:
    Av:
      alias: Av
      description: Av (metric) flow coefficient [m2]
      range: float
    Cv:
      alias: Cv
      description: Cv (US) flow coefficient [USG/min/(psi)^(1/2)]
      range: float
    Kv:
      alias: Kv
      description: Kv (metric) flow coefficient [m3/h/(bar)^(1/2)]
      range: float
    dp_fixed_nominal:
      alias: dpFixed_nominal
      description: Nominal pressure drop of pipes and other equipment in flow legs at port_1 and port_3 [Pa]
      ifabsent: string({2000,0})
      range: string
    dp_valve_nominal:
      alias: dpValve_nominal
      description: Nominal pressure drop of fully open valve, used if CvData=Buildings.Fluid.Types.CvTypes.OpPoint [Pa]
      ifabsent: float(6000)
      range: float
    fra_k:
      alias: fraK
      description: Fraction Kv(port_3->port_2)/Kv(port_1->port_2) [1]
      ifabsent: float(0.7)
      range: float
    fraction_of_nominal_flow_rate_where_linearization_starts_if_y_1:
      alias: deltaM
      description: Fraction of nominal flow rate where linearization starts, if y=1 [1]
      ifabsent: float(0.02)
      range: float
    m_flow_nominal:
      alias: m_flow_nominal
      description: Nominal mass flow rate [kg/s]
      ifabsent: float(0.3)
      range: float
    range_of_significant_deviation_from_equal_percentage_law:
      alias: delta0
      description: Range of significant deviation from equal percentage law [1]
      ifabsent: float(0.01)
      range: float
    rangeability:
      alias: R
      description: Rangeability, R=50...100 typically [1]
      ifabsent: float(50)
      range: float
    rho_std:
      alias: rhoStd
      description: Inlet density for which valve coefficients are defined [kg/m3]
      range: float
    use_linear_relation_between_m_flow_and_dp_for_any_flow_rate:
      alias: linearized
      description: = true, use linear relation between m_flow and dp for any flow rate
      ifabsent: string({true, true})
      range: string
    valve_leakage:
      alias: l
      description: Valve leakage, l=Kv(y=0)/Kv(y=1) [1]
      ifabsent: string({0.01,0.01})
      range: string
  classes:
  - ThreeWayValve
ValveParameters:
  attributes:
    av:
      alias: Av
      description: Av (metric) flow coefficient [m2]
      range: string
    cv:
      alias: Cv
      description: Cv (US) flow coefficient [USG/min/(psi)^(1/2)]
      range: float
    dp_fixed_nominal:
      alias: dpFixed_nominal
      description: Pressure drop of pipe and other resistances that are in series [Pa]
      ifabsent: float(5000)
      range: float
    dp_valve_nominal:
      alias: dpValve_nominal
      description: Nominal pressure drop of fully open valve, used if CvData=Buildings.Fluid.Types.CvTypes.OpPoint [Pa]
      ifabsent: float(10000)
      range: float
    fraction_of_nominal_flow_rate_where_linearization_starts_if_y_1:
      alias: deltaM
      description: Fraction of nominal flow rate where linearization starts, if y=1 [1]
      ifabsent: float(0.02)
      range: float
    k_fixed:
      alias: kFixed
      description: Flow coefficient of fixed resistance that may be in series with valve, k=m_flow/sqrt(dp), with unit=(kg.m)^(1/2)
      range: string
    kv:
      alias: Kv
      description: Kv (metric) flow coefficient [m3/h/(bar)^(1/2)]
      range: float
    m_flow_nominal:
      alias: m_flow_nominal
      description: Nominal mass flow rate [kg/s]
      ifabsent: float(0.02)
      range: float
    range_of_significant_deviation_from_equal_percentage_law:
      alias: delta0
      description: Range of significant deviation from equal percentage law [1]
      ifabsent: float(0.01)
      range: float
    rangeability:
      alias: R
      description: Rangeability, R=50...100 typically [1]
      ifabsent: float(50)
      range: float
    use_linear_relation_between_m_flow_and_dp_for_any_flow_rate:
      alias: linearized
      description: = true, use linear relation between m_flow and dp for any flow rate
      ifabsent: string(true)
      range: string
    use_m_flow_f_dp_else_dp_f_m_flow:
      alias: from_dp
      description: = true, use m_flow = f(dp) else dp = f(m_flow)
      ifabsent: string(true)
      range: string
    valve_leakage:
      alias: l
      description: Valve leakage, l=Kv(y=0)/Kv(y=1) [1]
      ifabsent: float(0.0001)
      range: float
  classes:
  - Valve
WeatherParameters:
  attributes:
    path:
      alias: filNam
      description: Name of weather data file
      ifabsent: string(None)
      range: string
  classes:
  - Weather
DataSource:
  description: Reference to a data source identified by a component and a variable
  attributes:
    component:
      alias: component
      description: Name of the component providing the data
      range: string
      required: true
    variable:
      alias: variable
      description: Name of the variable within the component
      range: string
      required: true
AhuParameters:
  attributes:
    m_flow_nominal:
      alias: m_flow_nominal
      description: Nominal mass flow rate [kg/s]
      ifabsent: string(2*100*1.2/3600)
      range: string
    dp_nominal:
      alias: dp_nominal
      description: Nominal pressure raise [Pa]
      ifabsent: string(200)
      range: string
    heat_exchanger_effectiveness:
      alias: eps
      description: Heat exchanger effectiveness [1]
      ifabsent: string(0.8)
      range: string

  classes:
  - AirHandlingUnit
