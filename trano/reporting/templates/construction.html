
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Layer Information Table</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 20px;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                margin-bottom: 20px;
                font-size: 1em;
            }
            th, td {
                padding: 12px;
                border: 1px solid #ddd;
                text-align: left;
            }
            th {
                background-color: #f4f4f4;
                font-weight: bold;
            }
            tr:nth-child(even) {
                background-color: #f9f9f9;
            }
            caption {
                font-size: 0.75em;
                margin-bottom: 10px;
                font-weight: bold;
                text-align: left;
            }
        </style>
    </head>
    <body>

    <table>
        <caption>Layers for {{ data.name }}</caption>
        <thead>
            <tr>
                <th>Name</th>
                <th>c</th>
                <th>epsLw</th>
                <th>epsSw</th>
                <th>k</th>
                <th>rho</th>
                <th>Thickness</th>
            </tr>
        </thead>
        <tbody>
        {% for layer in data.layers %}
            <tr>
                <td>{{ layer.name }}</td>
                <td>{{ layer.c }}</td>
                <td>{{ layer.epsLw }}</td>
                <td>{{ layer.epsSw }}</td>
                <td>{{ layer.k }}</td>
                <td>{{ layer.rho }}</td>
                <td>{{ layer.thickness }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

    </body>
    </html>
