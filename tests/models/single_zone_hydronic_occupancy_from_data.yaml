default: !include_default

weather:
  parameters:
    path: "../tests/resources/BEL_VLG_Uccle.064470_TMYx.2007-2021.mos"
spaces:
  - occupancy:
      variant: data
      parameters:
        occupancy: 3600*{9, 17}
        gain: "[40; 75; 40]"
        heat_gain_if_occupied: 1/7/3
        data:
          - component: 'passthrough_1'
            variable: 'temp_01'
          - component: 'passthrough_2'
            variable: 'co2_01'
    parameters:
      floor_area: 100.0
      average_room_height: 2.5
    id: SPACE:001
    external_boundaries:
      external_walls:
        - surface: 20
          azimuth: 0
          tilt: wall
          construction: CAVITYWALL:001
        - surface: 30
          azimuth: 90
          tilt: wall
          construction: CAVITYWALL:001
        - surface: 50
          azimuth: 180.0
          tilt: wall
          construction: CAVITYWALL:001
      windows:
        - surface: 5.0
          construction: INS3AR2020:001
          azimuth: 0
          tilt: wall
      floor_on_grounds:
        - surface: 50.0
          construction: CONCRETESLAB:001



