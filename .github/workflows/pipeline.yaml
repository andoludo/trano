name: Pipeline

on:
  push:

jobs:
  # ---------------------------------------------------------------------------
  # Linting — runs on branch pushes AND tag pushes, so the publish job is
  # actually gated on green CI for the tagged commit.
  # ---------------------------------------------------------------------------
  linting:
    runs-on: ubuntu-latest
    if: >-
      !contains(github.event.head_commit.message, 'Auto-increment')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev --group docs

      - name: Run linting
        run: make linting

  # ---------------------------------------------------------------------------
  # Tests — same trigger conditions as linting for consistency.
  # ---------------------------------------------------------------------------
  tests:
    needs: [linting]
    runs-on: ubuntu-latest
    if: >-
      !contains(github.event.head_commit.message, 'Auto-increment')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install dependencies
        run: uv sync --group dev --group docs

      - name: Run tests
        run: make tests

  # ---------------------------------------------------------------------------
  # Bump the static version in pyproject.toml, commit, and tag.
  # Only runs on pushes to master.
  # ---------------------------------------------------------------------------
  create-revision-and-tag:
    if: >-
      github.ref == 'refs/heads/master' &&
      !contains(github.event.head_commit.message, 'Auto-increment')
    needs: [tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 0      # needed so the auto-commit action can push

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # CHANGED: replaced the broken `uvx hatch version minor` pipeline with
      # `uv version`, which edits pyproject.toml directly and works with a
      # static project.version field.
      - name: Bump minor version
        run: |
          set -euo pipefail
          uv version --bump minor
          NEW_VERSION="$(uv version --short)"
          test -n "$NEW_VERSION"
          echo "NEW_VERSION=${NEW_VERSION}" >> "$GITHUB_ENV"

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Auto-increment release version

      - name: Create and push git tag
        run: |
          set -euo pipefail
          git tag "${NEW_VERSION}"
          git push origin "${NEW_VERSION}"
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}

  # ---------------------------------------------------------------------------
  # Publish — triggered by the tag pushed above (or any manually-pushed tag).
  # Needs linting + tests to have passed in THIS run (they now run on tags too).
  # ---------------------------------------------------------------------------
  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 0      # needed for `git describe` in release notes
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set version from tag
        run: echo "NEW_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Build source and wheel archives
        run: uv build

      - name: List generated files
        run: ls -l dist

      - name: Gather commit messages since last tag
        id: notes
        run: |
          set -euo pipefail
          PREV_TAG="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          if [ -n "${PREV_TAG}" ]; then
            NOTES="$(git log "${PREV_TAG}..${GITHUB_REF_NAME}" --pretty=format:'- %s')"
          else
            NOTES="$(git log --pretty=format:'- %s')"
          fi
          {
            echo "RELEASE_NOTES<<EOF"
            echo "${NOTES}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      # CHANGED: publish to PyPI FIRST, then create the GitHub release. This
      # way a PyPI failure doesn't leave behind a GitHub release pointing at
      # artifacts that don't exist on PyPI.
      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEW_VERSION }}
          name: Release ${{ env.NEW_VERSION }}
          body: |
            ## Release ${{ env.NEW_VERSION }}

            Commit: ${{ github.sha }}

            ### Changes
            ${{ env.RELEASE_NOTES }}
          files: dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}